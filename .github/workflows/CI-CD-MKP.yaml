name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      REGISTRY: docker.io
      IMAGE_NAME: karthikpatelmarkhale/k8s_ansible

    steps:

      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Build JAR File
      - name: Build JAR
        run: |
          cd Application
          mvn clean package -DskipTests

      # SonarQube Scan (Optional)
      # - name: SonarQube Scan
      #   run: |
      #     cd Application
      #     mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
      #     -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
      #     -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # Login to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker Image
      - name: Build Docker Image
        run: |
          cd Application
          docker build -t $REGISTRY/$IMAGE_NAME:${{ github.run_number }} .

      # Trivy Scan (Optional)
      # - name: Scan Docker Image
      #   uses: aquasecurity/trivy-action@0.20.0
      #   with:
      #     image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}
      #     severity: CRITICAL,HIGH
      #     ignore-unfixed: true

      # Push Docker Image
      - name: Push Docker Image
        run: |
          docker push $REGISTRY/$IMAGE_NAME:${{ github.run_number }}

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Update Kubernetes Deployment Manifest
      - name: Update K8s Deployment YAML
        run: |
          git config user.name "karthik patel"
          git config user.email "karthikpatelmarkhale@gmail.com"

          git pull origin main --rebase

          sed -i "s|k8s_ansible:.*|k8s_ansible:${{ github.run_number }}|g" Ansible/k8s_deployment.yaml

          git add Ansible/k8s_deployment.yaml

          git commit -m "Update deployment image tag to version ${{ github.run_number }} [skip ci]" || echo "No changes to commit"

          git push origin main

      # Install Ansible
      - name: Set up Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          python3 -m pip install --upgrade pip
          pip install ansible kubernetes

      # Install kubectl
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # Configure kubeconfig
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # Verify Cluster Access
      - name: Check Cluster Access
        run: |
          kubectl get nodes

      # Deploy Using Ansible
      - name: Run Ansible Playbook
        run: |
          ansible-playbook Ansible/ansible_k8s_deploy_playbook.yaml
